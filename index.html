<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'/><meta name='viewport' content='width=device-width, initial-scale=1.0'/><title>DR2MAP Command Center</title><link rel='stylesheet' href='https://unpkg.com/leaflet/dist/leaflet.css'/><script src='https://unpkg.com/leaflet/dist/leaflet.js'></script><style>:root{--line:#243247;--text:#f8fafc;--muted:#9ca3af;--red:#ef4444;--amber:#f59e0b;--green:#10b981}*{box-sizing:border-box}body{font-family:Arial,Helvetica,sans-serif;margin:0;background:linear-gradient(135deg,#020617,#0b1220);color:var(--text)}.container{max-width:1600px;margin:auto;padding:24px}.hero{display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap}.card{background:#111827;padding:18px;border-radius:16px;margin-bottom:16px;border:1px solid rgba(148,163,184,.16)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin:18px 0}.layout{display:grid;grid-template-columns:2fr 1fr;gap:18px}.metric{font-size:30px;font-weight:900}.subtle{color:var(--muted)}#map{height:520px;border-radius:14px}.controls{display:flex;gap:10px;flex-wrap:wrap}select,input,button{background:#020617;color:#fff;border:1px solid var(--line);border-radius:10px;padding:10px}table{width:100%;border-collapse:collapse}th,td{padding:10px;text-align:left;border-bottom:1px solid #263449}.high{color:#f87171}.mid{color:#fbbf24}.low{color:#34d399}</style></head><body><div class='container'><div class='hero'><div><h1>DR2MAP Resilience Dashboard</h1><p class='subtle' id='dataMode'>Loading shared DRMAP JSON...</p></div></div><div class='controls card'><select id='regionFilter'><option value='all'>All regions</option></select><select id='severityFilter'><option value='all'>All severity</option><option value='severe'>Severe only</option><option value='elevated'>Elevated+</option></select><input id='searchBox' placeholder='Search county...'/><button id='refreshBtn'>Refresh Shared Data</button></div><div class='grid' id='summaryCards'></div><div class='layout'><div><div class='card'><h2>Texas Operational Map</h2><div id='map'></div></div><div class='card'><h2>County Risk Matrix</h2><table><thead><tr><th>County</th><th>Region</th><th>Risk</th><th>Outages</th><th>Weather</th></tr></thead><tbody id='countyData'></tbody></table></div></div><div><div class='card'><h2>Priority County</h2><div id='priorityCounty'></div></div><div class='card'><h2>Recommendations</h2><ul id='recommendations'></ul></div></div></div></div><script>let state={summary:{},counties:[],recommendations:[]},map,markers=[];function riskClass(r){return r>=75?'high':r>=60?'mid':'low'}function riskColor(r){return r>=75?'#ef4444':r>=60?'#f59e0b':'#10b981'}function initMap(){map=L.map('map').setView([31,-99],6);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap contributors'}).addTo(map)}async function loadData(){const r=await fetch('https://wessmanj-a11y.github.io/DRMAP/drmap-data.json?ts='+Date.now());const data=await r.json();state.summary=data.summary;state.counties=data.counties;state.recommendations=data.recommendations;document.getElementById('dataMode').innerText='Shared DRMAP JSON loaded successfully.';updateRegions();render()}function updateRegions(){const regions=[...new Set(state.counties.map(c=>c.region))];document.getElementById('regionFilter').innerHTML='<option value="all">All regions</option>'+regions.map(r=>`<option>${r}</option>`).join('')}function filtered(){const region=regionFilter.value,sev=severityFilter.value,q=searchBox.value.toLowerCase();return state.counties.filter(c=>(region==='all'||c.region===region)&&(!q||c.name.toLowerCase().includes(q))&&(sev==='all'||(sev==='severe'&&c.risk>=75)||(sev==='elevated'&&c.risk>=60)))}function render(){const c=filtered();const s=state.summary;const summary=[['Customers Out',s.customersOut],['Counties Impacted',s.countiesImpacted],['Severe Counties',s.severeCounties],['Top Predicted Risk',s.topPredictedRisk],['NWS Alerts',s.weatherAlerts],['24h Trend',s.trend24h],['Hospital Occupancy',s.hospitalOccupancy],['Grid Stress',s.gridStress]];summaryCards.innerHTML=summary.map(i=>`<div class='card'><div class='subtle'>${i[0]}</div><div class='metric'>${i[1]}</div></div>`).join('');countyData.innerHTML=c.sort((a,b)=>b.risk-a.risk).map(x=>`<tr><td>${x.name}</td><td>${x.region}</td><td class='${riskClass(x.risk)}'>${x.risk}</td><td>${x.customersOut.toLocaleString()}</td><td>${x.weather}</td></tr>`).join('');const top=[...c].sort((a,b)=>b.risk-a.risk)[0];priorityCounty.innerHTML=`<strong>${top.name}</strong><br>Risk: ${top.risk}<br>Outages: ${top.customersOut.toLocaleString()}<br>Weather: ${top.weather}`;recommendations.innerHTML=state.recommendations.map(r=>`<li>${r}</li>`).join('');markers.forEach(m=>map.removeLayer(m));markers=[];c.forEach(x=>markers.push(L.circleMarker([x.lat,x.lng],{radius:Math.max(6,x.risk/7),color:riskColor(x.risk),fillColor:riskColor(x.risk),fillOpacity:.7}).addTo(map).bindPopup(`<strong>${x.name}</strong><br>Risk: ${x.risk}`)))}refreshBtn.onclick=loadData;regionFilter.oninput=render;severityFilter.oninput=render;searchBox.oninput=render;initMap();loadData();</script></body></html>
