<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DR2MAP</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin:0; background:#0b1220; color:#f3f4f6; }
    .container { max-width:1500px; margin:auto; padding:24px; }
    .hero { display:flex; justify-content:space-between; align-items:center; gap:20px; flex-wrap:wrap; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(220px,1fr)); gap:16px; margin:20px 0; }
    .two-col { display:grid; grid-template-columns: 2fr 1fr; gap:18px; }
    .card { background:#111827; padding:20px; border-radius:14px; margin-bottom:16px; box-shadow:0 8px 24px rgba(0,0,0,.25); }
    .metric { font-size:2rem; font-weight:bold; }
    .subtle { color:#9ca3af; }
    table { width:100%; border-collapse: collapse; }
    th, td { padding:10px; text-align:left; border-bottom:1px solid #374151; }
    .high { color:#f87171; font-weight:bold; }
    .mid { color:#fbbf24; font-weight:bold; }
    .low { color:#34d399; font-weight:bold; }
    ul { padding-left:20px; }
    #map { height:500px; border-radius:14px; }
    .county-card { border-top:1px solid #374151; padding-top:12px; margin-top:12px; }
    @media(max-width:1000px){ .two-col { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div>
      <h1>DR2MAP Resilience Command Center</h1>
      <p class="subtle">Operational disruption intelligence | Phase 3 Strategic Visualization</p>
    </div>
    <div class="card">
      <strong>Pipeline:</strong> <span id="pipelineStatus"></span><br>
      <span class="subtle" id="pipelineNext"></span>
    </div>
  </div>

  <div class="grid" id="summaryCards"></div>

  <div class="two-col">
    <div>
      <div class="card">
        <h2>Texas Operational Risk Map</h2>
        <div id="map"></div>
      </div>
      <div class="card">
        <h2>Texas County Risk Matrix</h2>
        <table>
          <thead><tr><th>County</th><th>Region</th><th>Risk</th><th>Outages</th><th>Incidents</th><th>Roads</th><th>Trend</th></tr></thead>
          <tbody id="countyData"></tbody>
        </table>
      </div>
    </div>
    <div>
      <div class="card">
        <h2>Operational Recommendations</h2>
        <ul id="recommendations"></ul>
      </div>
      <div class="card">
        <h2>Priority County Drilldown</h2>
        <div id="priorityCounty"></div>
      </div>
    </div>
  </div>
</div>
<script>
let map;
function riskClass(r){ if(r>=75) return 'high'; if(r>=60) return 'mid'; return 'low'; }
function riskColor(r){ if(r>=75) return '#ef4444'; if(r>=60) return '#f59e0b'; return '#10b981'; }
function initMap(){
 map = L.map('map').setView([31.0,-99.0],6);
 L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{ attribution:'&copy; OpenStreetMap contributors' }).addTo(map);
}
async function loadDashboard(){
 const res=await fetch('/api/dashboard');
 const data=await res.json();
 document.getElementById('pipelineStatus').innerText=data.pipeline.status;
 document.getElementById('pipelineNext').innerText=data.pipeline.nextMilestone;
 const summary=[['Customers Out',data.summary.totalCustomersOut.toLocaleString()],['Impacted Counties',data.summary.impactedCounties],['Severe Counties',data.summary.severeCounties],['Weather Alerts',data.summary.activeWeatherAlerts],['Road Closures',data.summary.roadClosures],['Grid Status',data.summary.gridStatus],['Trend',data.summary.statewideTrend]];
 document.getElementById('summaryCards').innerHTML=summary.map(item=>`<div class='card'><div class='subtle'>${item[0]}</div><div class='metric'>${item[1]}</div></div>`).join('');
 document.getElementById('countyData').innerHTML=data.counties.map(c=>`<tr><td>${c.name}</td><td>${c.region}</td><td class='${riskClass(c.risk)}'>${c.risk}</td><td>${c.outages.toLocaleString()}</td><td>${c.incidents}</td><td>${c.roads}</td><td>${c.trend}</td></tr>`).join('');
 document.getElementById('recommendations').innerHTML=data.recommendations.map(r=>`<li>${r}</li>`).join('');
 const topCounty=[...data.counties].sort((a,b)=>b.risk-a.risk)[0];
 document.getElementById('priorityCounty').innerHTML=`<h3>${topCounty.name} County</h3><div class='county-card'><strong>Risk:</strong> <span class='${riskClass(topCounty.risk)}'>${topCounty.risk}</span><br><strong>Outages:</strong> ${topCounty.outages.toLocaleString()}<br><strong>Incidents:</strong> ${topCounty.incidents}<br><strong>Weather:</strong> ${topCounty.weather}<br><strong>Operational Note:</strong> Highest current disruption pressure statewide.</div>`;
 data.counties.forEach(c=>{
   L.circleMarker([c.lat,c.lng],{ radius:Math.max(8,c.risk/6), color:riskColor(c.risk), fillColor:riskColor(c.risk), fillOpacity:.65 }).addTo(map).bindPopup(`<strong>${c.name}</strong><br>Risk: ${c.risk}<br>Outages: ${c.outages.toLocaleString()}<br>Trend: ${c.trend}`);
 });
}
initMap();
loadDashboard();
</script>
</body>
</html>
