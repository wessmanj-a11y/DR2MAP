<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DR2MAP</title>
  <style>
    body { font-family: Arial, sans-serif; margin:0; background:#0b1220; color:#f3f4f6; }
    .container { max-width:1400px; margin:auto; padding:24px; }
    .hero { display:flex; justify-content:space-between; align-items:center; gap:20px; flex-wrap:wrap; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(220px,1fr)); gap:16px; margin:20px 0; }
    .card { background:#111827; padding:20px; border-radius:14px; margin-bottom:16px; box-shadow:0 8px 24px rgba(0,0,0,.25); }
    .metric { font-size:2rem; font-weight:bold; }
    .subtle { color:#9ca3af; }
    table { width:100%; border-collapse: collapse; }
    th, td { padding:10px; text-align:left; border-bottom:1px solid #374151; }
    .high { color:#f87171; font-weight:bold; }
    .mid { color:#fbbf24; font-weight:bold; }
    .low { color:#34d399; font-weight:bold; }
    ul { padding-left:20px; }
  </style>
</head>
<body>
<div class="container">
  <div class="hero">
    <div>
      <h1>DR2MAP Resilience Command Center</h1>
      <p class="subtle">Operational disruption intelligence | Sandbox Phase 2</p>
    </div>
    <div class="card">
      <strong>Pipeline:</strong> <span id="pipelineStatus"></span><br>
      <span class="subtle" id="pipelineNext"></span>
    </div>
  </div>

  <div class="grid" id="summaryCards"></div>

  <div class="card">
    <h2>Texas County Risk Matrix</h2>
    <table>
      <thead><tr><th>County</th><th>Region</th><th>Risk</th><th>Outages</th><th>Incidents</th><th>Roads</th><th>Trend</th></tr></thead>
      <tbody id="countyData"></tbody>
    </table>
  </div>

  <div class="card">
    <h2>Operational Recommendations</h2>
    <ul id="recommendations"></ul>
  </div>
</div>
<script>
function riskClass(r){ if(r>=75) return 'high'; if(r>=60) return 'mid'; return 'low'; }
async function loadDashboard(){
 const res=await fetch('/api/dashboard');
 const data=await res.json();
 document.getElementById('pipelineStatus').innerText=data.pipeline.status;
 document.getElementById('pipelineNext').innerText=data.pipeline.nextMilestone;
 const summary=[
  ['Customers Out', data.summary.totalCustomersOut.toLocaleString()],
  ['Impacted Counties', data.summary.impactedCounties],
  ['Severe Counties', data.summary.severeCounties],
  ['Weather Alerts', data.summary.activeWeatherAlerts],
  ['Road Closures', data.summary.roadClosures],
  ['Grid Status', data.summary.gridStatus],
  ['Trend', data.summary.statewideTrend]
 ];
 document.getElementById('summaryCards').innerHTML=summary.map(item=>`<div class='card'><div class='subtle'>${item[0]}</div><div class='metric'>${item[1]}</div></div>`).join('');
 document.getElementById('countyData').innerHTML=data.counties.map(c=>`<tr><td>${c.name}</td><td>${c.region}</td><td class='${riskClass(c.risk)}'>${c.risk}</td><td>${c.outages.toLocaleString()}</td><td>${c.incidents}</td><td>${c.roads}</td><td>${c.trend}</td></tr>`).join('');
 document.getElementById('recommendations').innerHTML=data.recommendations.map(r=>`<li>${r}</li>`).join('');
}
loadDashboard();
</script>
</body>
</html>
